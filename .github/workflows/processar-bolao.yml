name: Pipeline do Bolão - Gemini

on:
  push:
    paths:
      - 'imagens/**'
  workflow_dispatch: # Permite forçar o deploy manualmente pelo botão

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  processar-e-publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm install

      - name: Chamar API do Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node processar.js

      - name: Salvar JSONs gerados de volta no Git
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [Bot] Adiciona dados consolidados via Gemini"
          file_pattern: 'dados/*.json'

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do Site Estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy para o GitHub Pages
        uses: actions/deploy-pages@v4
